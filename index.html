<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars & Premium Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 15px;
            margin: 10px;
            width: 90%;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>Магазин Stars & Premium</h2>
    
    <div class="card">
        <h3>🌟 50 Telegram Stars</h3>
        <p>Цена: 150₽</p>
        <button onclick="buyProduct('Stars 50')">Купить</button>
    </div>

    <div class="card">
        <h3>💎 Telegram Premium (1 мес)</h3>
        <p>Цена: 299₽</p>
        <button onclick="buyProduct('Premium 1 Month')">Купить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на все окно

        function buyProduct(name) {
            // Отправляем данные боту
            tg.sendData("order:" + name);
        }
    </script>
</body>
</html>
